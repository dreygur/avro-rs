name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy -p avro-core -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
      - run: cargo test -p avro-core

  build-fcitx5-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fcitx5-${{ hashFiles('Cargo.lock') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y libfcitx5core-dev libfcitx5utils-dev
      - run: cargo build -p fcitx5-adapter

  fcitx5-functional-test:
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - run: dnf -y install dnf5 && dnf -y install fcitx5 fcitx5-devel gcc-c++ cargo rust pkgconf-pkg-config
      - run: cp /usr/share/fcitx5/testing/addon/testfrontend.conf /usr/share/fcitx5/addon/testfrontend.conf
      - uses: actions/checkout@v4
      - run: make build && make install
      - run: |
          g++ -std=c++20 crates/fcitx5-adapter/tests/fcitx5_functional/avrotest.cpp \
            $(pkg-config --cflags --libs Fcitx5Core) \
            -I/usr/include/Fcitx5/Module/fcitx-module/testfrontend \
            -o /tmp/avrotest
      - run: /tmp/avrotest

  build-wasm-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock') }}
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo build --target wasm32-unknown-unknown -p wasm-adapter
      - run: cargo install wasm-bindgen-cli --version 0.2.125
      - run: make wasm
      - run: |
          test -f crates/wasm-adapter/pkg/wasm_adapter.js
          test -f crates/wasm-adapter/pkg/wasm_adapter_bg.wasm
          test -f crates/wasm-adapter/pkg/package.json
